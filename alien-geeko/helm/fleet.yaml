defaultNamespace: evantage
helm:
  repo: https://evantage-ws.github.io/helm-charts/
  chart: alien-geeko
  releaseName: alien-geeko
  values:
    namespace: evantage
    ingress:
      ingressClassName: traefik
      host: "alien-geeko-${ .ClusterLabels.domain }"
      tls:
        - secretName: cloud-native-net-wildcard-certificate-tls
